<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دليل التواصل</title>
    <meta name="description" content="وسائل التواصل مع الجهات المختلفة للوصول إلى مختلف الخدمات.">
    <meta name="theme-color" content="#F5F7FB">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      :root {
        --accent-color: #316FEA;
        --accent-strong: #1E58C8;
        --accent-tint: #EAF1FE;
        --dark-blue: #0A2D57;
        --navy-deep: #071E3D;
        --navy-mid: #123E72;
        --bg-main: #F5F7FB;
        --bg-card: #FFFFFF;
        --bg-button: #F1F4FA;
        --bg-button-hover: #E6EDF9;
        --text-dark: #16233E;
        --text-secondary: #7C879C;
        --line-soft: #EBEFF6;
        --radius-card: 24px;
        --radius-button: 16px;
        --radius-chip: 12px;
        --shadow-card: 0 1px 2px rgba(16, 35, 62, 0.04), 0 18px 46px -22px rgba(16, 35, 62, 0.22);
        --shadow-header: 0 18px 40px -20px rgba(10, 45, 87, 0.55);
        --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
        --header-glow-1: rgba(49, 111, 234, 0.30);
        --header-glow-2: rgba(49, 111, 234, 0.14);
        --row-hover: #FFFFFF;
        color-scheme: light;
      }

      html[data-theme="dark"] {
        --accent-color: #5B8DEF;
        --accent-strong: #86AAF4;
        --accent-tint: rgba(91, 141, 239, 0.16);
        --bg-main: #0D1524;
        --bg-card: #151E33;
        --bg-button: #1A2540;
        --bg-button-hover: #223052;
        --text-dark: #E7ECF6;
        --text-secondary: #93A0BA;
        --line-soft: #27324D;
        --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.3), 0 20px 50px -24px rgba(0, 0, 0, 0.7);
        --shadow-header: 0 22px 48px -24px rgba(0, 0, 0, 0.8);
        --header-glow-1: rgba(91, 141, 239, 0.24);
        --header-glow-2: rgba(91, 141, 239, 0.12);
        --row-hover: #1F2C49;
        color-scheme: dark;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html { scroll-behavior: smooth; }

      body, .content-card, .contact-link, .link-chip, .icon-only-btn,
      .overlay-page, .overlay-header, .back-btn, .card-header .icon-wrapper, .theme-toggle {
        transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      }

      @keyframes popIn {
        from { opacity: 0; transform: translateY(22px) scale(0.985); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.96); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      body {
        font-family: 'IBM Plex Sans Arabic', sans-serif;
        background-color: var(--bg-main);
        background-image:
          radial-gradient(circle at 100% -10%, var(--header-glow-2), transparent 45%),
          radial-gradient(circle at 0% 5%, rgba(10, 45, 87, 0.05), transparent 40%);
        color: var(--text-dark);
        direction: rtl;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      svg { display: block; flex-shrink: 0; }

      .app-wrapper {
        max-width: 760px;
        margin: 0 auto;
        padding: 1.75rem 1.25rem 7rem;
      }

      .page-header {
        position: relative;
        overflow: hidden;
        background-image:
          radial-gradient(circle at 88% -10%, var(--header-glow-1), transparent 52%),
          radial-gradient(circle at 5% 110%, var(--header-glow-2), transparent 45%),
          linear-gradient(155deg, var(--navy-mid) 0%, var(--dark-blue) 55%, var(--navy-deep) 100%);
        color: #FFFFFF;
        padding: 3rem 2rem 2.75rem;
        border-radius: var(--radius-card);
        text-align: center;
        box-shadow: var(--shadow-header);
        animation: popIn 0.8s var(--ease-out-quint) .05s both;
        margin-bottom: 1.75rem;
      }
      .page-header::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.14), transparent 55%);
        pointer-events: none;
      }
      .header-kicker {
        position: relative;
        display: inline-block;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #BFD2F2;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        padding: 0.3rem 0.85rem;
        border-radius: 999px;
        margin-bottom: 1rem;
      }
      .page-title {
        position: relative;
        font-family: 'Alexandria', 'IBM Plex Sans Arabic', sans-serif;
        font-size: clamp(2.2rem, 8vw, 2.9rem);
        font-weight: 700;
        line-height: 1.25;
        letter-spacing: -0.01em;
      }
      .title-rule {
        position: relative;
        display: block;
        width: 54px;
        height: 4px;
        margin: 1rem auto 0;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent-color), #7FA8F5);
      }
      .page-subtitle {
        position: relative;
        font-size: 1rem;
        max-width: 420px;
        margin: 1rem auto 0;
        line-height: 1.75;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.82);
      }

      .theme-toggle {
        position: absolute;
        top: 1.15rem;
        left: 1.15rem;
        z-index: 3;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.10);
        color: #FFFFFF;
        cursor: pointer;
        display: grid;
        place-items: center;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        transition: background-color 0.25s ease, transform 0.25s var(--ease-out-quint);
      }
      .theme-toggle:hover { background: rgba(255, 255, 255, 0.2); transform: rotate(-18deg); }
      .theme-toggle svg {
        position: absolute;
        width: 20px; height: 20px;
        transition: opacity 0.35s ease, transform 0.45s var(--ease-out-quint);
      }
      .theme-toggle .icon-sun { opacity: 0; transform: rotate(-90deg) scale(0.5); }
      .theme-toggle .icon-moon { opacity: 1; transform: rotate(0) scale(1); }
      html[data-theme="dark"] .theme-toggle .icon-sun { opacity: 1; transform: rotate(0) scale(1); }
      html[data-theme="dark"] .theme-toggle .icon-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }

      .content-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.25rem;
      }

      .content-card {
        background-color: var(--bg-card);
        border: 1px solid var(--line-soft);
        border-radius: var(--radius-card);
        padding: 1.5rem 1.35rem;
        box-shadow: var(--shadow-card);
        animation: popIn 0.8s var(--ease-out-quint) .18s both;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        margin-bottom: 1.25rem;
        padding-bottom: 1.1rem;
        border-bottom: 1px solid var(--line-soft);
      }
      .card-header .icon-wrapper {
        --ci: var(--accent-color);
        flex-shrink: 0;
        width: 48px; height: 48px;
        border-radius: 15px;
        background: color-mix(in srgb, var(--ci) 16%, transparent);
        color: var(--ci);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--ci) 26%, transparent);
      }
      .card-header .icon-wrapper svg { width: 25px; height: 25px; }
      .card-header .title {
        font-family: 'Alexandria', 'IBM Plex Sans Arabic', sans-serif;
        font-size: 1.4rem;
        font-weight: 600;
        color: var(--text-dark);
      }

      .links-group { display: flex; flex-direction: column; gap: 0.7rem; }

      .contact-link {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.7rem 0.9rem;
        border-radius: var(--radius-button);
        background: var(--bg-button);
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        transition: background-color 0.22s var(--ease-out-quint), transform 0.22s var(--ease-out-quint), border-color 0.22s ease, box-shadow 0.22s ease;
        color: var(--text-dark);
        width: 100%;
        cursor: pointer;
        min-height: 60px;
      }
      .contact-link:hover {
        background-color: var(--row-hover);
        border-color: var(--line-soft);
        transform: translateY(-2px);
        box-shadow: 0 12px 26px -16px rgba(0, 0, 0, 0.3);
      }
      .contact-link:hover .link-arrow { opacity: 1; transform: translateX(-3px); }

      .link-main-content {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        min-width: 0;
      }
      .link-main-content > span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      .link-chip {
        --ci: var(--accent-color);
        flex-shrink: 0;
        width: 42px; height: 42px;
        border-radius: var(--radius-chip);
        background: color-mix(in srgb, var(--ci) 15%, transparent);
        color: var(--ci);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--ci) 24%, transparent);
        transition: background-color 0.22s ease, color 0.22s ease, box-shadow 0.22s ease, transform 0.22s var(--ease-out-quint);
      }
      .link-chip svg { width: 21px; height: 21px; }
      .contact-link:hover .link-chip {
        background: var(--ci);
        color: #FFFFFF;
        box-shadow: 0 6px 16px -6px color-mix(in srgb, var(--ci) 70%, transparent);
        transform: scale(1.05);
      }
      .link-arrow {
        flex-shrink: 0;
        width: 18px; height: 18px;
        color: var(--text-secondary);
        opacity: 0.5;
        transition: opacity 0.22s ease, transform 0.22s var(--ease-out-quint);
      }

      .split-wrapper {
        position: relative;
        width: 100%;
        min-height: 60px;
      }
      .split-wrapper.active .main-trigger { display: none; }

      .actions-container {
        display: none;
        width: 100%;
        gap: 8px;
        animation: fadeIn 0.3s var(--ease-out-quint);
      }
      .split-wrapper.active .actions-container { display: flex; }

      .icon-only-btn {
        --ci: var(--accent-color);
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: color-mix(in srgb, var(--ci) 12%, transparent);
        border-radius: var(--radius-button);
        color: var(--ci);
        text-decoration: none;
        transition: background-color 0.22s ease, transform 0.22s var(--ease-out-quint), color 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
        height: 60px;
        border: 1px solid color-mix(in srgb, var(--ci) 24%, transparent);
        cursor: pointer;
      }
      .icon-only-btn svg { width: 24px; height: 24px; }
      .icon-only-btn:hover {
        background-color: var(--ci);
        border-color: var(--ci);
        color: #FFFFFF;
        transform: translateY(-2px);
        box-shadow: 0 10px 22px -10px color-mix(in srgb, var(--ci) 70%, transparent);
      }

      .overlay-page {
        position: fixed;
        inset: 0;
        background-color: var(--bg-main);
        z-index: 1000;
        display: none;
        flex-direction: column;
        overflow-y: auto;
        animation: slideUp 0.32s var(--ease-out-quint);
      }
      .overlay-page.visible { display: flex; }

      .overlay-header {
        background-color: var(--bg-card);
        padding: 1.1rem 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--line-soft);
        box-shadow: 0 6px 22px -18px rgba(16, 35, 62, 0.5);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .overlay-title {
        font-family: 'Alexandria', 'IBM Plex Sans Arabic', sans-serif;
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--text-dark);
      }
      .back-btn {
        background: var(--bg-button);
        border: 1px solid var(--line-soft);
        padding: 0.55rem 1rem;
        border-radius: 12px;
        color: var(--accent-strong);
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: background-color 0.2s ease, transform 0.2s ease;
      }
      .back-btn svg { width: 18px; height: 18px; }
      .back-btn:hover { background: var(--bg-button-hover); transform: translateX(3px); }

      .overlay-content {
        padding: 1.5rem 1.25rem 4rem;
        max-width: 760px;
        margin: 0 auto;
        width: 100%;
      }
      .college-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.7rem;
      }

      .page-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(0deg, var(--navy-deep), var(--dark-blue));
        color: white;
        padding: 0.85rem 1.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.75rem;
        z-index: 20;
        box-shadow: 0 -10px 30px -22px rgba(0,0,0,0.7);
      }
      .footer-link {
        color: white;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        opacity: 0.85;
        transition: opacity 0.2s ease, transform 0.2s ease;
        flex-direction: row-reverse;
      }
      .footer-link:hover { opacity: 1; transform: translateY(-2px); }
      .footer-link .icon-bg {
        width: 30px; height: 30px;
        border-radius: 50%;
        background-color: var(--accent-color);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px -4px rgba(49, 111, 234, 0.7);
      }
      .footer-link .icon-bg svg { width: 15px; height: 15px; }

      a:focus-visible, button:focus-visible {
        outline: 2px solid var(--accent-color);
        outline-offset: 3px;
      }

      @media (min-width: 620px) {
        .college-list { grid-template-columns: 1fr 1fr; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
</head>

            'globe': '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>',
            'building-2': '<path d="M10 12h4"/><path d="M10 8h4"/><path d="M14 21v-3a2 2 0 0 0-4 0v3"/><path d="M6 10H4a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2"/><path d="M6 21V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v16"/>',
            'chevron-left': '<path d="m15 18-6-6 6-6"/>'
        };

        const X_ICON = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>';

        function icon(name, cls) {
            if (name === 'x') return X_ICON;
            const body = ICONS[name] || '';
            const c = cls ? ' class="' + cls + '"' : '';
            return '<svg' + c + ' viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + body + '</svg>';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const COLLEGES_CONTACTS = [
                { name: "كلية الأعمال والاقتصاد", url: "https://www.qu.edu.sa/colleges/cbe/contact/" },
                { name: "كلية الشريعة", url: "https://www.qu.edu.sa/colleges/csi/contact/" },
                { name: "كلية اللغات والعلوم الإنسانية", url: "https://www.qu.edu.sa/colleges/asc/contact/" },
                { name: "كلية التربية", url: "https://www.qu.edu.sa/colleges/coe/contact/" },
                { name: "كلية الفنون والتصاميم", url: "https://www.qu.edu.sa/colleges/dhe/contact/" },
                { name: "كلية الحاسب", url: "https://www.qu.edu.sa/colleges/coc/contact/" },
                { name: "كلية العلوم", url: "https://www.qu.edu.sa/colleges/cos/contact/" },
                { name: "كلية الهندسة", url: "https://www.qu.edu.sa/colleges/qec/contact/" },
                { name: "كلية العمارة والتخطيط", url: "https://www.qu.edu.sa/colleges/cap/contact/" },
                { name: "كلية الزراعة والأغذية", url: "https://www.qu.edu.sa/colleges/cavm/contact/" },
                { name: "كلية الطب", url: "https://www.qu.edu.sa/colleges/med/contact/" },
                { name: "كلية العلوم الطبية التطبيقية", url: "https://www.qu.edu.sa/colleges/cams/contact/" },
                { name: "كلية الصيدلة", url: "https://www.qu.edu.sa/colleges/pharmacy/contact/" },
                { name: "كلية طب الأسنان", url: "https://www.qu.edu.sa/colleges/dent/contact/" },
                { name: "كلية التمريض", url: "https://www.qu.edu.sa/colleges/nursing/contact/" },
                { name: "كلية الطب البيطري", url: "https://www.qu.edu.sa/colleges/vmc/contact/" },
                { name: "الكلية التطبيقية", url: "https://www.qu.edu.sa/colleges/qac/contact/" }
            ];

            const COLLEGE_COLOR = "#6366F1";

            const SITE_DATA = [
                {
                    title: 'قائمة الجهات',
                    icon: 'book-user',
                    color: '#3B82F6',
                    links: [
                        { href: "https://t.me/Qassim_R/223", icon: "clipboard-check", text: "عمادة القبول والتسجيل", c: "#3B82F6" },
                        { href: "https://t.me/Qassim_R/224", icon: "headset", text: "مركز رعاية المستفيدين", c: "#14B8A6" },
                        {
                            type: 'splitter',
                            text: "شؤون الكليات",
                            icon: "landmark",
                            c: "#6366F1",
                            actions: [
                                { href: "https://t.me/Qassim_R/171", icon: "phone", c: "#10B981" },
                                { action: "open_emails", icon: "mail", c: "#3B82F6" },
                                { href: "https://t.me/Qassim_R/229", icon: "globe", c: "#0EA5E9" },
                                { href: "https://t.me/Qassim_R/230", icon: "x", c: "#8B5CF6" }
                            ]
                        },
                        { href: "https://t.me/Qassim_R/226", icon: "graduation-cap", text: "عمادة شؤون الطلاب", c: "#8B5CF6" },
                        { href: "https://t.me/Qassim_R/227", icon: "hand-coins", text: "قسم المنح الداخلية", c: "#F59E0B" },
                        { href: "https://t.me/Qassim_R/228", icon: "layout-grid", text: "أخرى", c: "#64748B" }
                    ]
                }
            ];

            const grid = document.getElementById('content-grid');
            const overlayListContainer = document.getElementById('colleges-list-container');

            const createCardHTML = (cardData) => {
                const header = `
                    <div class="card-header">
                        <div class="icon-wrapper" style="--ci:${cardData.color || 'var(--accent-color)'}">${icon(cardData.icon)}</div>
                        <h2 class="title">${cardData.title}</h2>
                    </div>`;

                const createLinksGroup = links => {
                    return `<div class="links-group">${links.map(link => {

                        if (link.type === 'splitter') {
                            const actionButtons = link.actions.map(act => {
                                if (act.action === 'open_emails') {
                                    return `
                                    <button onclick="openEmailOverlay()" class="icon-only-btn" style="--ci:${act.c || 'var(--accent-color)'}">
                                        ${icon(act.icon)}
                                    </button>`;
                                }
                                return `
                                <a href="${act.href}" target="_blank" rel="noopener noreferrer" class="icon-only-btn" style="--ci:${act.c || 'var(--accent-color)'}">
                                    ${icon(act.icon)}
                                </a>`;
                            }).join('');

                            return `
                            <div class="split-wrapper">
                                <button class="contact-link main-trigger" onclick="activateSplitter(this)">
                                    <div class="link-main-content">
                                        <span class="link-chip" style="--ci:${link.c || 'var(--accent-color)'}">${icon(link.icon)}</span>
                                        <span>${link.text}</span>
                                    </div>
                                    ${icon('chevron-left', 'link-arrow')}
                                </button>
                                <div class="actions-container">
                                    ${actionButtons}
                                </div>
                            </div>`;
                        }

                        return `
                        <a href="${link.href}" target="_blank" rel="noopener noreferrer" class="contact-link">
                            <div class="link-main-content">
                                <span class="link-chip" style="--ci:${link.c || 'var(--accent-color)'}">${icon(link.icon)}</span>
                                <span>${link.text}</span>
                            </div>
                            ${icon('chevron-left', 'link-arrow')}
                        </a>`;
                    }).join('')}</div>`;
                };

                const body = createLinksGroup(cardData.links);
                return `<section class="content-card">${header}${body}</section>`;
            };

            const populateOverlay = () => {
                const listHTML = COLLEGES_CONTACTS.map(college => `
                    <a href="${college.url}" target="_blank" rel="noopener noreferrer" class="contact-link">
                        <div class="link-main-content">
                            <span class="link-chip" style="--ci:${COLLEGE_COLOR}">${icon('building-2')}</span>
                            <span>${college.name}</span>
                        </div>
                        ${icon('chevron-left', 'link-arrow')}
                    </a>
                `).join('');
                overlayListContainer.innerHTML = listHTML;
            };

            const initialize = () => {
                const cardHTML = SITE_DATA.map(createCardHTML).join('');
                grid.insertAdjacentHTML('afterbegin', cardHTML);
                populateOverlay();
            };

            initialize();
        });

        function activateSplitter(btn) {
            const wrapper = btn.closest('.split-wrapper');
            wrapper.classList.add('active');
        }

        function openEmailOverlay() {
            const overlay = document.getElementById('emails-overlay');
            overlay.classList.add('visible');
            document.body.style.overflow = 'hidden';
        }

        function closeEmailOverlay() {
            const overlay = document.getElementById('emails-overlay');
            overlay.classList.remove('visible');
            document.body.style.overflow = '';
        }

        function toggleTheme() {
            const root = document.documentElement;
            const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', next);
            try { localStorage.setItem('theme', next); } catch (e) {}
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', next === 'dark' ? '#0D1524' : '#F5F7FB');
        }
    </script>
</body>
</html>

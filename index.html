<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دليل التواصل</title>
    <meta name="description" content="وسائل التواصل مع الجهات المختلفة للوصول إلى مختلف الخدمات.">
    <meta name="theme-color" content="#F7F9FC">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
      :root {
        --accent-color: #316FEA;
        --dark-blue: #0A2D57;
        --bg-main: #F7F9FC;
        --bg-card: #FFFFFF;
        --bg-button: #F0F4F8;
        --text-dark: #192a4e;
        --text-secondary: #8A94A6;
        --radius-card: 24px;
        --radius-button: 16px;
        --shadow: 0 10px 40px -15px rgba(150, 170, 200, 0.4);
        --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html { scroll-behavior: smooth; }

      @keyframes popIn { 
        from { opacity: 0; transform: translateY(20px) scale(0.98); } 
        to { opacity: 1; transform: translateY(0) scale(1); } 
      }
      
      body {
        font-family: 'IBM Plex Sans Arabic', sans-serif;
        background-color: var(--bg-main);
        color: var(--text-dark);
        direction: rtl;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .app-wrapper {
        max-width: 800px;
        margin: 0 auto;
        padding: 1.5rem 1.5rem 6rem;
      }
      
      .page-header {
        background-image: linear-gradient(160deg, #12427d, var(--dark-blue)),
                          radial-gradient(circle at 0% 0%, rgba(255, 255, 255, 0.1) 0%, transparent 40%);
        color: #FFFFFF;
        padding: 2.5rem;
        border-radius: var(--radius-card);
        text-align: center;
        box-shadow: 0 10px 30px -10px rgba(10, 45, 87, 0.5);
        animation: popIn 0.8s var(--ease-out-quint) .1s both;
        margin-bottom: 2rem;
      }
      .page-title {
        font-size: clamp(2.2rem, 8vw, 2.8rem);
        font-weight: 700;
        line-height: 1.3;
      }
      .page-subtitle {
        font-size: 1rem;
        max-width: 450px;
        margin: 0.5rem auto 0;
        line-height: 1.7;
        font-weight: 400;
        opacity: 0.8;
      }
      
      .content-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.25rem;
      }
      
      .content-card {
        background-color: var(--bg-card);
        border-radius: var(--radius-card);
        padding: 1.5rem;
        box-shadow: var(--shadow);
        animation: popIn 0.8s var(--ease-out-quint) .2s both;
      }
      
      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--bg-main);
      }
      .card-title-group {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-direction: row-reverse;
      }
      .card-header .title { font-size: 1.6rem; font-weight: 700; color: var(--text-dark); }
      .card-header .icon-wrapper {
        width: 44px; height: 44px;
        border-radius: 12px;
        background-color: var(--bg-button);
        color: var(--accent-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }

      .links-group { display: flex; flex-direction: column; gap: 0.75rem; }
      
      .contact-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        border-radius: var(--radius-button);
        background: var(--bg-button);
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        transition: background-color 0.2s ease, transform 0.2s ease;
        color: var(--text-dark);
        border: none;
        width: 100%;
        cursor: pointer;
        min-height: 56px;
      }
      .contact-link:hover {
        background-color: #e4eaf3;
        transform: translateY(-2px);
      }
      .link-main-content {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .contact-link i { font-size: 1.1rem; color: var(--accent-color); min-width: 20px; text-align: center;}
      
      .split-wrapper {
        position: relative;
        width: 100%;
        min-height: 56px;
      }

      .split-wrapper.active .main-trigger {
        display: none;
      }
      
      .actions-container {
        display: none;
        width: 100%;
        height: 100%;
        gap: 8px;
        animation: fadeIn 0.3s ease;
      }
      
      .split-wrapper.active .actions-container {
        display: flex;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }

      .icon-only-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-button);
        border-radius: var(--radius-button);
        color: var(--accent-color);
        font-size: 1.4rem;
        text-decoration: none;
        transition: all 0.2s ease;
        height: 56px;
        border: 2px solid transparent;
        cursor: pointer;
      }
      
      .icon-only-btn:hover {
        background-color: #e4eaf3;
        transform: translateY(-2px);
      }

      .overlay-page {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--bg-main);
        z-index: 1000;
        display: none;
        flex-direction: column;
        overflow-y: auto;
        animation: slideUp 0.3s ease-in-out;
      }
      
      .overlay-page.visible {
        display: flex;
      }

      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .overlay-header {
        background-color: var(--bg-card);
        padding: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .overlay-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text-dark);
      }

      .back-btn {
        background: var(--bg-button);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 12px;
        color: var(--accent-color);
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .overlay-content {
        padding: 1.5rem;
        max-width: 800px;
        margin: 0 auto;
        width: 100%;
        padding-bottom: 4rem;
      }

      .college-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .page-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: var(--dark-blue);
        color: white;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        z-index: 20;
      }
      .footer-link {
        color: white;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        opacity: 0.8;
        transition: opacity 0.2s ease;
        flex-direction: row-reverse;
      }
      .footer-link:hover {
        opacity: 1;
      }
      .footer-link .icon-bg {
        width: 28px; height: 28px;
        border-radius: 50%;
        background-color: var(--accent-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
      }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header class="page-header">
            <h1 class="page-title">دليل التواصل</h1>
            <p class="page-subtitle">وسائل التواصل مع الجهات المختلفة.</p>
        </header>
        
        <main class="content-grid" id="content-grid">
        </main>
    </div>

    <div id="emails-overlay" class="overlay-page">
        <div class="overlay-header">
            <button class="back-btn" onclick="closeEmailOverlay()">
                <i class="fas fa-arrow-right"></i> رجوع
            </button>
            <h2 class="overlay-title">تواصل الكليات</h2>
        </div>
        <div class="overlay-content">
            <div id="colleges-list-container" class="college-list">
            </div>
        </div>
    </div>
    
    <footer class="page-footer">
        <a href="https://t.me/Qassim_U" class="footer-link" target="_blank" rel="noopener noreferrer">
            <span class="icon-bg"><i class="fas fa-users"></i></span>
            <span>Qassim_U</span>
        </a>
        <a href="https://t.me/Qassim_QU" class="footer-link" target="_blank" rel="noopener noreferrer">
            <span class="icon-bg"><i class="fas fa-bullhorn"></i></span>
            <span>Qassim_QU</span>
        </a>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const COLLEGES_CONTACTS = [
                { name: "كلية الأعمال والاقتصاد", url: "https://www.qu.edu.sa/colleges/cbe/contact/" },
                { name: "كلية الشريعة", url: "https://www.qu.edu.sa/colleges/csi/contact/" },
                { name: "كلية اللغات والعلوم الإنسانية", url: "https://www.qu.edu.sa/colleges/asc/contact/" },
                { name: "كلية التربية", url: "https://www.qu.edu.sa/colleges/coe/contact/" },
                { name: "كلية الفنون والتصاميم", url: "https://www.qu.edu.sa/colleges/dhe/contact/" },
                { name: "كلية الحاسب", url: "https://www.qu.edu.sa/colleges/coc/contact/" },
                { name: "كلية العلوم", url: "https://www.qu.edu.sa/colleges/cos/contact/" },
                { name: "كلية الهندسة", url: "https://www.qu.edu.sa/colleges/qec/contact/" },
                { name: "كلية العمارة والتخطيط", url: "https://www.qu.edu.sa/colleges/cap/contact/" },
                { name: "كلية الزراعة والأغذية", url: "https://www.qu.edu.sa/colleges/cavm/contact/" },
                { name: "كلية الطب", url: "https://www.qu.edu.sa/colleges/med/contact/" },
                { name: "كلية العلوم الطبية التطبيقية", url: "https://www.qu.edu.sa/colleges/cams/contact/" },
                { name: "كلية الصيدلة", url: "https://www.qu.edu.sa/colleges/pharmacy/contact/" },
                { name: "كلية طب الأسنان", url: "https://www.qu.edu.sa/colleges/dent/contact/" },
                { name: "كلية التمريض", url: "https://www.qu.edu.sa/colleges/nursing/contact/" },
                { name: "كلية الطب البيطري", url: "https://www.qu.edu.sa/colleges/vmc/contact/" },
                { name: "الكلية التطبيقية", url: "https://www.qu.edu.sa/colleges/qac/contact/" }
            ];

            const SITE_DATA = [
                {
                    title: 'قائمة الجهات',
                    icon: 'fa-address-book',
                    links: [
                        { href: "https://t.me/Qassim_R/223", icon: "fa-id-card", text: "عمادة القبول والتسجيل" },
                        { href: "https://t.me/Qassim_R/224", icon: "fa-headset", text: "مركز رعاية المستفيدين" },
                        { 
                            type: 'splitter', 
                            text: "شؤون الكليات", 
                            icon: "fa-building-columns",
                            actions: [
                                { href: "https://t.me/Qassim_R/171", icon: "fa-phone" },
                                { action: "open_emails", icon: "fa-envelope" }, 
                                { href: "https://t.me/Qassim_R/229", icon: "fa-globe" },
                                { href: "https://t.me/Qassim_R/230", icon: "fa-brands fa-x-twitter" }
                            ]
                        },
                        { href: "https://t.me/Qassim_R/226", icon: "fa-users", text: "عمادة شؤون الطلاب" },
                        { href: "https://t.me/Qassim_R/227", icon: "fa-file-invoice-dollar", text: "قسم المنح الداخلية" },
                        { href: "https://t.me/Qassim_R/228", icon: "fa-ellipsis-h", text: "أخرى" }
                    ]
                }
            ];
            
            const grid = document.getElementById('content-grid');
            const overlayListContainer = document.getElementById('colleges-list-container');

            const createCardHTML = (cardData) => {
                const header = `
                    <div class="card-header">
                        <div class="card-title-group">
                            <h2 class="title">${cardData.title}</h2>
                            <div class="icon-wrapper"><i class="fas ${cardData.icon}"></i></div>
                        </div>
                    </div>`;
                
                const createLinksGroup = links => {
                    return `<div class="links-group">${links.map(link => {
                        
                        if (link.type === 'splitter') {
                            const actionButtons = link.actions.map(act => {
                                if (act.action === 'open_emails') {
                                    return `
                                    <button onclick="openEmailOverlay()" class="icon-only-btn">
                                        <i class="fas ${act.icon}"></i>
                                    </button>`;
                                }
                                return `
                                <a href="${act.href}" target="_blank" class="icon-only-btn">
                                    <i class="fas ${act.icon}"></i>
                                </a>`;
                            }).join('');

                            return `
                            <div class="split-wrapper">
                                <button class="contact-link main-trigger" onclick="activateSplitter(this)">
                                    <div class="link-main-content">
                                        <i class="fas ${link.icon}"></i>
                                        <span>${link.text}</span>
                                    </div>
                                </button>
                                <div class="actions-container">
                                    ${actionButtons}
                                </div>
                            </div>`;
                        }
                        
                        return `
                        <a href="${link.href}" target="_blank" rel="noopener noreferrer" class="contact-link">
                            <div class="link-main-content">
                                <i class="fas ${link.icon}"></i>
                                <span>${link.text}</span>
                            </div>
                        </a>`;
                    }).join('')}</div>`;
                };

                const body = createLinksGroup(cardData.links);
                return `<section class="content-card">${header}${body}</section>`;
            };

            const populateOverlay = () => {
                const listHTML = COLLEGES_CONTACTS.map(college => `
                    <a href="${college.url}" target="_blank" rel="noopener noreferrer" class="contact-link">
                        <div class="link-main-content">
                            <i class="fas fa-building-user"></i>
                            <span>${college.name}</span>
                        </div>
                        <i class="fas fa-chevron-left" style="font-size: 0.8rem; opacity: 0.5;"></i>
                    </a>
                `).join('');
                overlayListContainer.innerHTML = listHTML;
            };

            const initialize = () => {
                const cardHTML = SITE_DATA.map(createCardHTML).join('');
                grid.insertAdjacentHTML('afterbegin', cardHTML);
                populateOverlay();
            };

            initialize();
        });

        function activateSplitter(btn) {
            const wrapper = btn.closest('.split-wrapper');
            wrapper.classList.add('active');
        }

        function openEmailOverlay() {
            const overlay = document.getElementById('emails-overlay');
            overlay.classList.add('visible');
            document.body.style.overflow = 'hidden';
        }

        function closeEmailOverlay() {
            const overlay = document.getElementById('emails-overlay');
            overlay.classList.remove('visible');
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>

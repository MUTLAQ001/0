<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل التواصل - جامعة القصيم</title>
    <meta name="description" content="وسائل التواصل مع الجهات المختلفة للوصول إلى مختلف الخدمات.">
    <meta name="theme-color" content="#eef3f9">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Alexandria:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0f2b48;
            --primary-deep: #0a1f36;
            --secondary-color: #179c8e;
            --secondary-bright: #4dd8c8;
            --secondary-soft: rgba(23, 156, 142, 0.1);
            --page-bg: #eef3f9;
            --card-bg: #ffffff;
            --card-border: #e3eaf2;
            --text-dark: #22303e;
            --text-gray: #7d8a97;

            --header-grad-1: #0f2b48;
            --header-grad-2: #14385d;
            --header-grad-3: #11554f;
            --shadow-soft: 0 4px 15px rgba(15, 43, 72, 0.05);
            --shadow-hover: 0 12px 30px rgba(15, 43, 72, 0.1);
        }

        body.dark {
            --primary-color: #cfe3f5;
            --primary-deep: #060e18;
            --secondary-color: #2fc4b4;
            --secondary-bright: #4dd8c8;
            --secondary-soft: rgba(47, 196, 180, 0.12);
            --page-bg: #0d1520;
            --card-bg: #16202e;
            --card-border: #24344a;
            --text-dark: #e6edf5;
            --text-gray: #8fa0b3;

            --header-grad-1: #0a1826;
            --header-grad-2: #0f2438;
            --header-grad-3: #0c3531;
            --shadow-soft: 0 4px 15px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 12px 30px rgba(0, 0, 0, 0.45);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--page-bg);
            margin: 0;
            padding: 0 0 88px 0;
            color: var(--text-dark);
            min-height: 100vh;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .page-hero {
            background: linear-gradient(135deg, var(--header-grad-1) 0%, var(--header-grad-2) 55%, var(--header-grad-3) 100%);
            padding: 38px 20px 44px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .page-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 26px 26px;
            pointer-events: none;
        }

        .page-hero::after {
            content: '';
            position: absolute;
            top: -90px;
            left: -90px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(23,156,142,0.28), transparent 70%);
            pointer-events: none;
        }

        .hero-inner { position: relative; z-index: 2; }

        .uni-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.75);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 9px;
        }

        .uni-eyebrow::before, .uni-eyebrow::after {
            content: '';
            width: 28px;
            height: 1px;
            background: rgba(255,255,255,0.3);
        }

        .page-title {
            font-family: 'Alexandria', 'IBM Plex Sans Arabic', sans-serif;
            color: #ffffff;
            font-size: 30px;
            font-weight: 800;
            margin: 0;
            line-height: 1.3;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 13px;
            padding: 7px 18px;
            background-color: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(6px);
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
        }

        .hero-badge i { color: var(--secondary-bright); font-size: 13px; }

        .theme-toggle {
            position: absolute;
            top: 18px;
            left: 18px;
            z-index: 5;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.22);
            background: linear-gradient(150deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04));
            backdrop-filter: blur(8px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, background 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            background: linear-gradient(150deg, rgba(255,255,255,0.24), rgba(255,255,255,0.06));
        }

        .theme-toggle:active { transform: scale(0.94); }
        .theme-toggle:focus-visible { outline: 2px solid var(--secondary-bright); outline-offset: 3px; }

        .theme-toggle i {
            position: absolute;
            font-size: 17px;
            transition: opacity 0.35s ease, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .theme-toggle .icon-moon { color: #eaf1fb; opacity: 1; transform: rotate(0deg) scale(1); }
        .theme-toggle .icon-sun { color: #fbbf24; opacity: 0; transform: rotate(-70deg) scale(0.4); }
        body.dark .theme-toggle .icon-moon { opacity: 0; transform: rotate(70deg) scale(0.4); }
        body.dark .theme-toggle .icon-sun { opacity: 1; transform: rotate(0deg) scale(1); }

        .container {
            max-width: 900px;
            margin: 0 auto 26px auto;
            padding: 26px 20px 0 20px;
        }

        .section-head { text-align: center; margin-bottom: 18px; }

        .section-title {
            font-family: 'Alexandria', 'IBM Plex Sans Arabic', sans-serif;
            color: var(--text-dark);
            margin: 0 0 10px 0;
            font-size: 19px;
            font-weight: 700;
        }

        .title-divider {
            width: 70px;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary-color), var(--secondary-bright));
            margin: 0 auto 9px auto;
            border-radius: 4px;
        }

        .section-note {
            color: var(--text-gray);
            font-size: 12.5px;
            font-weight: 600;
            margin: 0;
            line-height: 1.6;
        }

        .entity-list { display: flex; flex-direction: column; gap: 11px; }

        .entity-card {
            --ci: #3B82F6;
            display: block;
            width: 100%;
            text-align: right;
            text-decoration: none;
            font-family: inherit;
            border: 2px solid transparent;
            border-radius: 18px;
            background: linear-gradient(var(--card-bg), var(--card-bg)) padding-box,
                        linear-gradient(135deg, var(--ci), color-mix(in srgb, var(--ci) 55%, #06121f)) border-box;
            box-shadow: var(--shadow-soft);
            cursor: pointer;
            overflow: hidden;
            padding: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s, background-color 0.4s ease;
        }

        .entity-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
        .entity-card:active { transform: scale(0.98); }
        .entity-card:focus-visible { outline: 2px solid var(--secondary-color); outline-offset: 3px; }

        .row-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 16px;
        }

        .type-icon {
            width: 38px;
            height: 38px;
            min-width: 38px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: #fff;
            background: linear-gradient(135deg, var(--ci), color-mix(in srgb, var(--ci) 60%, #06121f));
            box-shadow: 0 6px 16px -8px var(--ci);
        }

        .row-text { flex: 1; min-width: 0; }

        .row-name {
            font-size: 15.5px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.5;
        }

        .row-arrow {
            color: var(--text-gray);
            font-size: 14px;
            transition: transform 0.3s cubic-bezier(0.34, 1.45, 0.64, 1), color 0.25s ease;
        }

        .entity-card:hover .row-arrow { color: var(--ci); transform: translateX(-4px); }

        .entity-card.expandable.open .row-arrow { transform: rotate(-90deg); color: var(--ci); }

        .entity-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 9px;
            padding: 0 20px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease, padding 0.4s ease;
        }

        .entity-card.open .entity-actions {
            max-height: 260px;
            opacity: 1;
            padding: 4px 20px 20px 20px;
        }

        .action-btn {
            --ai: var(--secondary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 11px 6px;
            border-radius: 13px;
            border: 1.5px solid var(--card-border);
            background: var(--page-bg);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .action-btn i { font-size: 16px; color: var(--ai); transition: color 0.25s ease; }
        .action-btn svg { width: 16px; height: 16px; fill: var(--ai); display: block; }

        .action-btn:hover {
            border-color: var(--ai);
            transform: translateY(-3px);
            box-shadow: 0 10px 22px -12px var(--ai);
        }

        .action-btn:focus-visible { outline: 2px solid var(--ai); outline-offset: 2px; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(6, 14, 24, 0.55);
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.open { opacity: 1; visibility: visible; }

        .modal-card {
            width: 94vw;
            max-width: 760px;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(6, 14, 24, 0.5);
            transform: translateY(24px) scale(0.98);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.open .modal-card { transform: translateY(0) scale(1); }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 20px 22px;
            border-bottom: 1px solid var(--card-border);
            background: linear-gradient(135deg, var(--header-grad-1), var(--header-grad-2));
        }

        .modal-head-text h3 {
            font-family: 'Alexandria', 'IBM Plex Sans Arabic', sans-serif;
            color: #fff;
            font-size: 19px;
            font-weight: 700;
            margin: 0;
        }

        .modal-head-text p { color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600; margin: 4px 0 0 0; }

        .modal-close {
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.25s, transform 0.25s;
        }

        .modal-close:hover { background: rgba(255,255,255,0.18); transform: rotate(90deg); }
        .modal-close:focus-visible { outline: 2px solid var(--secondary-bright); outline-offset: 2px; }

        .modal-body {
            padding: 18px 20px 22px 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 11px;
        }

        .college-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 15px;
            border: 1px solid var(--card-border);
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: var(--shadow-soft);
            text-decoration: none;
            color: var(--text-dark);
            font-size: 14.5px;
            font-weight: 700;
            transition: transform 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.28s, border-color 0.28s;
        }

        .college-row:hover {
            transform: translateY(-3px);
            border-color: #6366F1;
            box-shadow: var(--shadow-hover);
        }

        .college-row:focus-visible { outline: 2px solid #6366F1; outline-offset: 2px; }

        .college-icon {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 11px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            background: linear-gradient(135deg, #6366F1, #4338CA);
        }

        .college-row span { flex: 1; line-height: 1.55; }
        .college-row .go { color: var(--text-gray); font-size: 12px; }

        .page-footer {
            background-color: var(--card-bg);
            border-top: 1px solid var(--card-border);
            padding: 16px 0;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.06);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            z-index: 1000;
            transition: background-color 0.4s ease;
        }

        .footer-link {
            display: inline-flex;
            flex-direction: row-reverse;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            font-size: 14px;
            background-color: var(--page-bg);
            border: 1px solid var(--card-border);
            padding: 11px 24px;
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .footer-link:hover {
            border-color: var(--secondary-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(23, 156, 142, 0.15);
        }

        .icon-bg { color: var(--secondary-color); font-size: 17px; }

        .reveal { opacity: 0; transform: translateY(14px); transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        .entity-list .reveal:nth-child(1) { transition-delay: 0.04s; }
        .entity-list .reveal:nth-child(2) { transition-delay: 0.09s; }
        .entity-list .reveal:nth-child(3) { transition-delay: 0.14s; }
        .entity-list .reveal:nth-child(4) { transition-delay: 0.19s; }
        .entity-list .reveal:nth-child(5) { transition-delay: 0.24s; }
        .entity-list .reveal:nth-child(6) { transition-delay: 0.29s; }

        @media (min-width: 620px) {
            .modal-body { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 768px) {
            .page-hero { padding: 32px 16px 38px 16px; }
            .page-title { font-size: 25px; }
            .container { padding-top: 22px; }
            .entity-list { gap: 9px; }
            .row-inner { padding: 12px 13px; gap: 11px; }
            .row-name { font-size: 14.5px; }
            .type-icon { width: 35px; height: 35px; min-width: 35px; font-size: 14px; }
            .entity-actions { grid-template-columns: repeat(2, 1fr); padding: 0 15px; }
            .entity-card.open .entity-actions { padding: 4px 15px 16px 15px; }
            .page-footer { padding: 12px 10px; gap: 10px; }
            .footer-link { padding: 10px 18px; font-size: 13px; }
        }

        @media (max-height: 720px) {
            .page-hero { padding: 26px 16px 32px 16px; }
            .page-title { font-size: 23px; }
            .uni-eyebrow { margin-bottom: 7px; }
            .hero-badge { margin-top: 10px; padding: 6px 16px; font-size: 12px; }
            .container { padding-top: 18px; }
            .section-head { margin-bottom: 14px; }
            .section-title { font-size: 18px; }
            .section-note { font-size: 12px; }
            .entity-list { gap: 8px; }
            .row-inner { padding: 10px 13px; gap: 10px; }
            .type-icon { width: 33px; height: 33px; min-width: 33px; font-size: 13px; }
            .row-name { font-size: 14px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
            .reveal { opacity: 1; transform: none; }
        }
    </style>
</head>
<body>

    <header class="page-hero">
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="تبديل الوضع الليلي"><i class="fas fa-moon icon-moon"></i><i class="fas fa-sun icon-sun"></i></button>
        <div class="hero-inner">
            <div class="uni-eyebrow">جامعة القصيم</div>
            <h1 class="page-title">دليل التواصل</h1>
            <div class="hero-badge"><i class="fas fa-headset"></i><span>قنوات التواصل الرسمية</span></div>
        </div>
    </header>

    <div class="container">
        <section class="list-section">
            <div class="section-head">
                <h2 class="section-title">قائمة الجهات</h2>
                <div class="title-divider"></div>
                <p class="section-note">اضغط على الجهة للانتقال إلى وسائل التواصل الخاصة بها</p>
            </div>
            <div class="entity-list" id="entity-list"></div>

    <div class="modal-overlay" id="colleges-overlay" aria-hidden="true">

            <span class="icon-bg"><i class="fas fa-users"></i></span>
            <span>Qassim_U</span>
        </a>
        <a href="https://t.me/Qassim_QU" class="footer-link" target="_blank" rel="noopener noreferrer">
            <span class="icon-bg"><i class="fas fa-bullhorn"></i></span>
            <span>Qassim_QU</span>
        </a>
    </footer>

    <script>
        (function initTheme() {
            try {
                const btn = document.getElementById('theme-toggle');
                const meta = document.querySelector('meta[name="theme-color"]');
                let saved = null;
                try { saved = localStorage.getItem('qu-theme'); } catch (e) {}

                if (saved === 'dark') {
                    document.body.classList.add('dark');
                    if (meta) meta.setAttribute('content', '#0d1520');
                }

                btn.addEventListener('click', function () {
                    const isDark = document.body.classList.toggle('dark');
                    try { localStorage.setItem('qu-theme', isDark ? 'dark' : 'light'); } catch (e) {}
                    if (meta) meta.setAttribute('content', isDark ? '#0d1520' : '#eef3f9');
                });
            } catch (e) {}
        })();

        const X_LOGO = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>';

            {

            {

                icon: 'fa-landmark',
                color: '#6366F1',
                actions: [
                    { label: 'الهواتف', icon: 'fa-phone', color: '#10B981', href: 'https://t.me/Qassim_R/171' },
                    { label: 'الإيميلات', icon: 'fa-envelope', color: '#3B82F6', action: 'colleges' },
                    { label: 'المواقع', icon: 'fa-globe', color: '#0EA5E9', href: 'https://t.me/Qassim_R/229' },
                    { label: 'منصة X', svg: X_LOGO, color: '#8B5CF6', href: 'https://t.me/Qassim_R/230' }
                ]
            },
            {
                name: 'عمادة شؤون الطلاب',
                icon: 'fa-graduation-cap',
                color: '#8B5CF6',
                href: 'https://t.me/Qassim_R/226'
            },
            {
                name: 'قسم المنح الداخلية',
                icon: 'fa-hand-holding-dollar',
                color: '#F59E0B',
                href: 'https://t.me/Qassim_R/227'
            },
            {
                name: 'أخرى',
                icon: 'fa-table-cells-large',
                color: '#64748B',
                href: 'https://t.me/Qassim_R/228'
            }
        ];

        const COLLEGES = [
            { name: 'كلية الأعمال والاقتصاد', url: 'https://www.qu.edu.sa/colleges/cbe/contact/' },
            { name: 'كلية الشريعة', url: 'https://www.qu.edu.sa/colleges/csi/contact/' },
            { name: 'كلية اللغات والعلوم الإنسانية', url: 'https://www.qu.edu.sa/colleges/asc/contact/' },
            { name: 'كلية التربية', url: 'https://www.qu.edu.sa/colleges/coe/contact/' },
            { name: 'كلية الفنون والتصاميم', url: 'https://www.qu.edu.sa/colleges/dhe/contact/' },
            { name: 'كلية الحاسب', url: 'https://www.qu.edu.sa/colleges/coc/contact/' },
            { name: 'كلية العلوم', url: 'https://www.qu.edu.sa/colleges/cos/contact/' },
            { name: 'كلية الهندسة', url: 'https://www.qu.edu.sa/colleges/qec/contact/' },
            { name: 'كلية العمارة والتخطيط', url: 'https://www.qu.edu.sa/colleges/cap/contact/' },
            { name: 'كلية الزراعة والأغذية', url: 'https://www.qu.edu.sa/colleges/cavm/contact/' },
            { name: 'كلية الطب', url: 'https://www.qu.edu.sa/colleges/med/contact/' },
            { name: 'كلية العلوم الطبية التطبيقية', url: 'https://www.qu.edu.sa/colleges/cams/contact/' },
            { name: 'كلية الصيدلة', url: 'https://www.qu.edu.sa/colleges/pharmacy/contact/' },
            { name: 'كلية طب الأسنان', url: 'https://www.qu.edu.sa/colleges/dent/contact/' },
            { name: 'كلية التمريض', url: 'https://www.qu.edu.sa/colleges/nursing/contact/' },
            { name: 'كلية الطب البيطري', url: 'https://www.qu.edu.sa/colleges/vmc/contact/' },
            { name: 'الكلية التطبيقية', url: 'https://www.qu.edu.sa/colleges/qac/contact/' }
        ];

        function buildRowInner(item, arrowIcon) {
            return '<div class="row-inner">' +
                       '<span class="type-icon"><i class="fas ' + item.icon + '"></i></span>' +
                       '<span class="row-text"><span class="row-name">' + item.name + '</span></span>' +
                       '<span class="row-arrow"><i class="fas ' + arrowIcon + '"></i></span>' +
                   '</div>';
        }

        function buildEntity(item) {
            if (item.actions) {
                const buttons = item.actions.map(function (act) {
                    const glyph = act.svg ? act.svg : '<i class="fas ' + act.icon + '"></i>';
                    const inner = glyph + '<span>' + act.label + '</span>';
                    if (act.action === 'colleges') {
                        return '<button type="button" class="action-btn" data-open-colleges="1" style="--ai:' + act.color + '">' + inner + '</button>';
                    }
                    return '<a class="action-btn" href="' + act.href + '" target="_blank" rel="noopener noreferrer" style="--ai:' + act.color + '">' + inner + '</a>';
                }).join('');

                return '<div class="entity-card expandable reveal" style="--ci:' + item.color + '" role="button" tabindex="0" aria-expanded="false">' +
                           buildRowInner(item, 'fa-chevron-left') +
                           '<div class="entity-actions">' + buttons + '</div>' +
                       '</div>';
            }

            return '<a class="entity-card reveal" style="--ci:' + item.color + '" href="' + item.href + '" target="_blank" rel="noopener noreferrer">' +
                       buildRowInner(item, 'fa-chevron-left') +
                   '</a>';
        }

        function renderColleges() {
            document.getElementById('colleges-body').innerHTML = COLLEGES.map(function (c) {
                return '<a class="college-row" href="' + c.url + '" target="_blank" rel="noopener noreferrer">' +
                           '<span class="college-icon"><i class="fas fa-building-columns"></i></span>' +
                           '<span>' + c.name + '</span>' +
                           '<i class="fas fa-arrow-up-right-from-square go"></i>' +
                       '</a>';
            }).join('');
        }

        function setupReveal() {
            const items = document.querySelectorAll('.reveal');
            if (!('IntersectionObserver' in window)) {
                items.forEach(function (el) { el.classList.add('visible'); });
                return;
            }
            const obs = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        obs.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.12 });
            items.forEach(function (el) { obs.observe(el); });
        }

        function openColleges() {
            const overlay = document.getElementById('colleges-overlay');
            overlay.classList.add('open');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeColleges() {
            const overlay = document.getElementById('colleges-overlay');
            overlay.classList.remove('open');
            overlay.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('entity-list').innerHTML = ENTITIES.map(buildEntity).join('');
            renderColleges();

            document.querySelectorAll('.entity-card.expandable').forEach(function (card) {
                function toggle() {
                    const open = card.classList.toggle('open');
                    card.setAttribute('aria-expanded', open ? 'true' : 'false');
                }
                card.addEventListener('click', function (e) {
                    if (e.target.closest('.action-btn')) return;
                    toggle();
                });
                card.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        toggle();
                    }
                });
            });

            document.querySelectorAll('[data-open-colleges]').forEach(function (btn) {
                btn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    openColleges();
                });
            });

            const overlay = document.getElementById('colleges-overlay');
            document.getElementById('colleges-close').addEventListener('click', closeColleges);
            overlay.addEventListener('click', function (e) { if (e.target === overlay) closeColleges(); });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && overlay.classList.contains('open')) closeColleges();
            });

            setupReveal();
        });
    </script>
</body>
</html>
